# Configuration for training Node Phys model
# Usage: python run_training.py --config configs/node_phys/node_0.yaml

model: node_phys
epochs: 1200
batch_size: 64
lr: 0.001
lr_decay: "exponential_decay"
lr_decay_rate: 0.95
lr_decay_epochs: 10

# Model architecture
hidden_dim: 128
depth: 4
relative_distances: true

# System parameters
mass: [1.0, 1.0, 1.0]
spring_constant: 0.05
rest_length: [0.9, 0.9, 0.9]

# Data generation
n_trajectories: 4000
trajectory_length: 1.0
trajectory_steps: 101
train_fraction: 0.85

# Saving
savedir: "checkpoints/node_phys/"
model_name: "three_mass_spring_node_phys"

# Misc
seed: 6

